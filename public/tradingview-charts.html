<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Trading Academy — Live Charts</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --navy: #1B2A4A;
    --navy-light: #243B60;
    --green: #0D9373;
    --green-light: #10B981;
    --green-dark: #0B7A60;
    --bg: #0F1724;
    --bg-card: #1A2332;
    --bg-hover: #222F42;
    --border: #2A3A52;
    --text: #E2E8F0;
    --text-muted: #94A3B8;
    --red: #EF4444;
    --amber: #F59E0B;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px; background: var(--navy); border-bottom: 1px solid var(--border);
    z-index: 100; flex-shrink: 0;
  }
  .top-bar-left { display: flex; align-items: center; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
  .logo-icon {
    width: 36px; height: 36px; background: linear-gradient(135deg, var(--green), var(--green-dark));
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: white;
  }
  .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-text span { color: var(--green-light); }
  .divider { width: 1px; height: 24px; background: var(--border); }

  /* Symbol Input */
  .symbol-input-wrap {
    display: flex; align-items: center; gap: 8px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; position: relative;
  }
  .symbol-input-wrap .icon { color: var(--text-muted); font-size: 14px; }
  #symbolInput {
    background: none; border: none; color: var(--text); font-size: 14px; font-weight: 600;
    font-family: 'Inter', monospace; width: 120px; outline: none; text-transform: uppercase;
  }
  #symbolInput::placeholder { color: var(--text-muted); text-transform: none; font-weight: 400; }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 0 0 8px 8px; max-height: 300px;
    overflow-y: auto; z-index: 200; display: none;
  }
  .search-results.active { display: block; }
  .search-result-item {
    padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid rgba(42,58,82,0.5); font-size: 13px;
  }
  .search-result-item:hover { background: var(--bg-hover); }
  .search-result-item .sym { font-weight: 700; color: var(--green-light); }
  .search-result-item .name { color: var(--text-muted); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .search-result-item .exch { font-size: 10px; color: var(--text-muted); background: var(--bg); padding: 2px 6px; border-radius: 4px; }

  /* Interval Buttons */
  .interval-bar { display: flex; align-items: center; gap: 4px; }
  .interval-btn {
    background: none; border: 1px solid transparent; color: var(--text-muted);
    padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .interval-btn:hover { color: var(--text); background: var(--bg-hover); }
  .interval-btn.active { color: var(--green-light); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.3); }

  /* Top Bar Right */
  .top-bar-right { display: flex; align-items: center; gap: 10px; }
  .fullscreen-btn, .back-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
    padding: 7px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .fullscreen-btn:hover, .back-btn:hover { color: var(--text); border-color: var(--green); background: var(--bg-hover); }
  .back-btn { color: var(--green-light); border-color: var(--green); }

  /* Price Display */
  .price-display {
    display: flex; align-items: center; gap: 16px; padding: 0 16px;
  }
  .price-current { font-size: 20px; font-weight: 800; color: var(--text); font-family: 'Inter', monospace; }
  .price-change { font-size: 13px; font-weight: 600; font-family: 'Inter', monospace; }
  .price-change.up { color: var(--green-light); }
  .price-change.down { color: var(--red); }

  /* ===== CHART CONTAINER ===== */
  #tv_chart_container {
    flex: 1; width: 100%; min-height: 0; position: relative;
  }

  /* ===== BOTTOM BAR ===== */
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 20px; background: var(--navy); border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted); flex-shrink: 0;
  }
  .bottom-bar a { color: var(--green-light); text-decoration: none; }
  .bottom-bar a:hover { text-decoration: underline; }
  .data-status { display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-light); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ===== LOADING OVERLAY ===== */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 500;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .loading-overlay.hidden { display: none; }
  .loading-spinner {
    width: 48px; height: 48px; border: 3px solid var(--border);
    border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: var(--text-muted); font-size: 14px; }

  /* Responsive */
  @media (max-width: 768px) {
    .top-bar { padding: 8px 12px; flex-wrap: wrap; gap: 8px; }
    .interval-bar { flex-wrap: wrap; }
    .price-display { padding: 0 8px; }
    .top-bar-right { flex-wrap: wrap; }
    #symbolInput { width: 80px; }
  }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <p>Loading Impact Trading Academy Charts...</p>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <div class="top-bar-left">
    <a href="/" class="logo">
      <div class="logo-icon">M</div>
      <div class="logo-text">Impact <span>Trading Academy</span></div>
    </a>
    <div class="divider"></div>

    <!-- Symbol Search -->
    <div class="symbol-input-wrap">
      <span class="icon">&#128269;</span>
      <input type="text" id="symbolInput" value="AAPL" placeholder="Search symbol..." autocomplete="off" spellcheck="false">
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Price Display -->
    <div class="price-display">
      <span class="price-current" id="priceDisplay">&mdash;</span>
      <span class="price-change" id="priceChange"></span>
    </div>

    <div class="divider"></div>

    <!-- Interval Buttons -->
    <div class="interval-bar" id="intervalBar">
      <button class="interval-btn" data-res="1">1m</button>
      <button class="interval-btn" data-res="5">5m</button>
      <button class="interval-btn" data-res="15">15m</button>
      <button class="interval-btn" data-res="30">30m</button>
      <button class="interval-btn" data-res="60">1H</button>
      <button class="interval-btn" data-res="240">4H</button>
      <button class="interval-btn active" data-res="D">1D</button>
      <button class="interval-btn" data-res="W">1W</button>
      <button class="interval-btn" data-res="M">1M</button>
    </div>
  </div>

  <div class="top-bar-right">
    <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen">&#x26F6; Fullscreen</button>
    <a href="/" class="back-btn">&larr; Back to Academy</a>
  </div>
</div>

<!-- TradingView Chart Container -->
<div id="tv_chart_container"></div>

<!-- Bottom Bar -->
<div class="bottom-bar">
  <div class="data-status">
    <div class="status-dot"></div>
    <span>Real-time market data &middot; Powered by <a href="https://www.tradingview.com/" target="_blank" rel="noopener">TradingView</a></span>
  </div>
  <div>
    <span>Impact Trading Academy &middot; Mission Metrics</span>
  </div>
</div>

<!-- TradingView Widget Script -->
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>

<script>
// =============================================================================
// CONFIGURATION
// =============================================================================

const API_BASE = window.location.origin;
const DEFAULT_SYMBOL = 'AAPL';
const DEFAULT_RESOLUTION = 'D';

let tvWidget = null;
let currentSymbol = DEFAULT_SYMBOL;
let currentResolution = DEFAULT_RESOLUTION;
let searchTimeout = null;

// =============================================================================
// TRADINGVIEW ADVANCED CHARTS WIDGET
// =============================================================================

function initChart(symbol, resolution) {
  currentSymbol = (symbol || DEFAULT_SYMBOL).toUpperCase();
  currentResolution = resolution || DEFAULT_RESOLUTION;

  // Clear existing widget
  const container = document.getElementById('tv_chart_container');
  container.innerHTML = '';

  // Map our resolution codes to TradingView widget intervals
  var intervalMap = {
    '1': '1', '5': '5', '15': '15', '30': '30',
    '60': '60', '240': '240',
    'D': 'D', 'W': 'W', 'M': 'M'
  };
  var tvInterval = intervalMap[currentResolution] || 'D';

  tvWidget = new TradingView.widget({
    // Core
    symbol: currentSymbol,
    interval: tvInterval,
    container_id: 'tv_chart_container',
    autosize: true,

    // Theme — Mission Metrics Dark
    theme: 'dark',
    style: '1',  // Candlestick
    toolbar_bg: '#1B2A4A',
    locale: 'en',
    timezone: 'America/New_York',

    // Features
    enable_publishing: false,
    allow_symbol_change: true,
    save_image: true,
    hide_top_toolbar: false,
    hide_legend: false,
    hide_side_toolbar: false,
    withdateranges: true,
    details: true,
    hotlist: false,
    calendar: false,
    show_popup_button: true,
    popup_width: '1000',
    popup_height: '650',

    // Default studies (indicators)
    studies: [
      'MASimple@tv-basicstudies',
      'Volume@tv-basicstudies'
    ],

    // Appearance overrides
    overrides: {
      // Chart background
      'paneProperties.backgroundType': 'solid',
      'paneProperties.background': '#0F1724',
      'paneProperties.vertGridProperties.color': 'rgba(42, 58, 82, 0.3)',
      'paneProperties.horzGridProperties.color': 'rgba(42, 58, 82, 0.3)',
      'scalesProperties.textColor': '#94A3B8',
      'scalesProperties.lineColor': '#2A3A52',

      // Candle colors — Green UP, Red DOWN
      'mainSeriesProperties.candleStyle.upColor': '#10B981',
      'mainSeriesProperties.candleStyle.downColor': '#EF4444',
      'mainSeriesProperties.candleStyle.borderUpColor': '#10B981',
      'mainSeriesProperties.candleStyle.borderDownColor': '#EF4444',
      'mainSeriesProperties.candleStyle.wickUpColor': '#10B981',
      'mainSeriesProperties.candleStyle.wickDownColor': '#EF4444',

      // Hollow candle
      'mainSeriesProperties.hollowCandleStyle.upColor': '#10B981',
      'mainSeriesProperties.hollowCandleStyle.downColor': '#EF4444',
      'mainSeriesProperties.hollowCandleStyle.borderUpColor': '#10B981',
      'mainSeriesProperties.hollowCandleStyle.borderDownColor': '#EF4444',

      // Bar
      'mainSeriesProperties.barStyle.upColor': '#10B981',
      'mainSeriesProperties.barStyle.downColor': '#EF4444',

      // Heikin Ashi
      'mainSeriesProperties.haStyle.upColor': '#10B981',
      'mainSeriesProperties.haStyle.downColor': '#EF4444',
      'mainSeriesProperties.haStyle.borderUpColor': '#10B981',
      'mainSeriesProperties.haStyle.borderDownColor': '#EF4444',
      'mainSeriesProperties.haStyle.wickUpColor': '#10B981',
      'mainSeriesProperties.haStyle.wickDownColor': '#EF4444',

      // Line chart
      'mainSeriesProperties.lineStyle.color': '#10B981',

      // Area chart
      'mainSeriesProperties.areaStyle.linecolor': '#10B981',
      'mainSeriesProperties.areaStyle.color1': 'rgba(16, 185, 129, 0.28)',
      'mainSeriesProperties.areaStyle.color2': 'rgba(16, 185, 129, 0.02)',

      // Volume colors
      'volume.volume.color.0': 'rgba(239, 68, 68, 0.5)',
      'volume.volume.color.1': 'rgba(16, 185, 129, 0.5)'
    },

    // Studies overrides
    studies_overrides: {
      'volume.volume.color.0': 'rgba(239, 68, 68, 0.5)',
      'volume.volume.color.1': 'rgba(16, 185, 129, 0.5)',
      'volume.volume ma.color': '#F59E0B',
      'bollinger bands.median.color': '#10B981',
      'bollinger bands.upper.color': '#3B82F6',
      'bollinger bands.lower.color': '#3B82F6',
      'moving average.plot.color': '#F59E0B',
      'moving average exponential.plot.color': '#8B5CF6',
      'relative strength index.plot.color': '#10B981',
      'macd.macd.color': '#10B981',
      'macd.signal.color': '#EF4444',
      'stochastic.%k.color': '#10B981',
      'stochastic.%d.color': '#EF4444'
    },

    // Loading screen
    loading_screen: {
      backgroundColor: '#0F1724',
      foregroundColor: '#10B981'
    }
  });

  // Hide loading overlay once widget iframe loads
  var checkLoaded = setInterval(function () {
    var iframe = container.querySelector('iframe');
    if (iframe) {
      clearInterval(checkLoaded);
      iframe.addEventListener('load', function () {
        document.getElementById('loadingOverlay').classList.add('hidden');
      });
      // Fallback: hide loading after 4 seconds max
      setTimeout(function () {
        document.getElementById('loadingOverlay').classList.add('hidden');
      }, 4000);
    }
  }, 200);

  // Update price display
  updatePriceDisplay();
}

// =============================================================================
// PRICE DISPLAY (via our Yahoo Finance backend)
// =============================================================================

async function updatePriceDisplay() {
  try {
    var resp = await fetch(API_BASE + '/api/stock-data?symbol=' + encodeURIComponent(currentSymbol) + '&range=5d&interval=1d');
    if (!resp.ok) return;
    var data = await resp.json();
    var price = data.regularMarketPrice || 0;
    var prevClose = data.previousClose || 0;

    if (price > 0) {
      document.getElementById('priceDisplay').textContent = '$' + price.toFixed(2);
      if (prevClose > 0) {
        var change = price - prevClose;
        var pct = (change / prevClose * 100);
        var el = document.getElementById('priceChange');
        el.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + ' (' + (change >= 0 ? '+' : '') + pct.toFixed(2) + '%)';
        el.className = 'price-change ' + (change >= 0 ? 'up' : 'down');
      }
    }
  } catch (e) {
    // Silently fail — not critical
  }
}

// =============================================================================
// SYMBOL SEARCH (via our Yahoo Finance backend)
// =============================================================================

var symbolInput = document.getElementById('symbolInput');
var searchResults = document.getElementById('searchResults');

symbolInput.addEventListener('input', function () {
  clearTimeout(searchTimeout);
  var q = this.value.trim();
  if (q.length < 1) { searchResults.classList.remove('active'); return; }

  searchTimeout = setTimeout(async function () {
    try {
      var resp = await fetch(API_BASE + '/api/stock-search?q=' + encodeURIComponent(q));
      if (!resp.ok) return;
      var results = await resp.json();

      if (results.length === 0) { searchResults.classList.remove('active'); return; }

      searchResults.innerHTML = results.map(function (r) {
        return '<div class="search-result-item" data-symbol="' + r.symbol + '">' +
          '<span><span class="sym">' + r.symbol + '</span> <span class="name">' + (r.name || '') + '</span></span>' +
          '<span class="exch">' + (r.exchange || r.type || '') + '</span></div>';
      }).join('');
      searchResults.classList.add('active');

      searchResults.querySelectorAll('.search-result-item').forEach(function (item) {
        item.addEventListener('click', function () {
          var sym = this.dataset.symbol;
          symbolInput.value = sym;
          searchResults.classList.remove('active');
          changeSymbol(sym);
        });
      });
    } catch (e) {}
  }, 300);
});

symbolInput.addEventListener('keydown', function (e) {
  if (e.key === 'Enter') {
    searchResults.classList.remove('active');
    var sym = this.value.trim().toUpperCase();
    if (sym) changeSymbol(sym);
  }
  if (e.key === 'Escape') {
    searchResults.classList.remove('active');
  }
});

symbolInput.addEventListener('focus', function () { this.select(); });

document.addEventListener('click', function (e) {
  if (!e.target.closest('.symbol-input-wrap')) searchResults.classList.remove('active');
});

function changeSymbol(symbol) {
  currentSymbol = symbol.toUpperCase();
  symbolInput.value = currentSymbol;
  // Recreate widget with new symbol (most reliable method)
  initChart(currentSymbol, currentResolution);
}

// =============================================================================
// INTERVAL BUTTONS
// =============================================================================

document.getElementById('intervalBar').addEventListener('click', function (e) {
  var btn = e.target.closest('.interval-btn');
  if (!btn) return;
  var res = btn.dataset.res;
  currentResolution = res;
  updateIntervalButtons();
  // Recreate widget with new interval
  initChart(currentSymbol, currentResolution);
});

function updateIntervalButtons() {
  document.querySelectorAll('.interval-btn').forEach(function (btn) {
    btn.classList.toggle('active', btn.dataset.res === currentResolution);
  });
}

// =============================================================================
// TOOLBAR BUTTONS
// =============================================================================

// Fullscreen button
document.getElementById('fullscreenBtn').addEventListener('click', function () {
  var container = document.getElementById('tv_chart_container');
  if (document.fullscreenElement) {
    document.exitFullscreen();
  } else {
    (container.requestFullscreen || container.webkitRequestFullscreen || container.msRequestFullscreen).call(container);
  }
});

// =============================================================================
// URL PARAMS (deep linking — supports ?symbol=AAPL&interval=D)
// =============================================================================

function getUrlParams() {
  var params = new URLSearchParams(window.location.search);
  return {
    symbol: (params.get('symbol') || params.get('s') || DEFAULT_SYMBOL).toUpperCase(),
    resolution: params.get('resolution') || params.get('interval') || params.get('r') || DEFAULT_RESOLUTION
  };
}

// =============================================================================
// BOOT
// =============================================================================

document.addEventListener('DOMContentLoaded', function () {
  var params = getUrlParams();
  symbolInput.value = params.symbol;
  currentSymbol = params.symbol;
  currentResolution = params.resolution;
  updateIntervalButtons();

  // Small delay to ensure tv.js is fully loaded
  setTimeout(function () {
    if (typeof TradingView !== 'undefined') {
      initChart(params.symbol, params.resolution);
    } else {
      document.getElementById('loadingOverlay').innerHTML =
        '<p style="color: #EF4444; text-align: center; padding: 20px;">' +
        'Failed to load TradingView Charts.<br>' +
        'Please check your internet connection and refresh the page.</p>';
    }
  }, 300);
});
</script>
</body>
</html>
