<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halt Tracker — Impact Trading Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--navy:#1B2A4A;--emerald:#0D9373;--emerald-light:#10B981;--bg:#F0F5F3;--card:#FFF;--border:#E5E7EB;--text:#1B2A4A;--muted:#6B7280;--red:#EF4444;--amber:#F59E0B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#1B2A4A,#243B60);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:40px;height:40px;background:linear-gradient(135deg,var(--red),#F87171);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}
.header h1{font-size:18px;color:#fff;font-weight:700}.header h1 span{color:#F87171}
.header p{font-size:11px;color:rgba(255,255,255,0.6);margin-top:2px}
.btn-outline{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;background:transparent;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.85);transition:all 0.2s}
.btn-outline:hover{background:rgba(255,255,255,0.1);color:#fff}
.content{max-width:960px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.card h2{font-size:16px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.card h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.live-badge{display:inline-flex;align-items:center;gap:4px;background:#FEE2E2;color:#DC2626;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px}
.live-badge .blink{width:6px;height:6px;border-radius:50%;background:#DC2626;animation:pulse 1s infinite}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
.stat{background:#F7FAF9;border-radius:8px;padding:12px 14px;text-align:center}
.stat .lbl{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);letter-spacing:0.5px}
.stat .val{font-size:22px;font-weight:800;margin-top:3px;color:var(--navy)}
.halt-list{border:1px solid var(--border);border-radius:10px;overflow:hidden}
.halt-item{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;transition:background 0.15s;cursor:pointer}
.halt-item:last-child{border-bottom:none}
.halt-item:hover{background:rgba(13,147,115,0.03)}
.halt-sym{font-size:15px;font-weight:800;min-width:70px;color:var(--navy)}
.halt-reason{flex:1}
.halt-reason .reason{font-size:13px;font-weight:600;color:var(--text)}
.halt-reason .detail{font-size:11px;color:var(--muted);margin-top:2px}
.halt-time{text-align:right;min-width:100px}
.halt-time .time{font-size:13px;font-weight:600;color:var(--navy)}
.halt-time .ago{font-size:10px;color:var(--muted)}
.status-badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.status-halted{background:#FEE2E2;color:#DC2626}
.status-resumed{background:#D1FAE5;color:#059669}
.status-pending{background:#FEF3C7;color:#92400E}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.refresh-btn{padding:8px 18px;background:var(--emerald);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-left:auto}
.refresh-btn:hover{background:var(--emerald-light)}
.refresh-btn:disabled{opacity:0.5}
.explanation{background:rgba(27,42,74,0.04);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px;font-size:12px;color:var(--text);line-height:1.7}
.explanation h3{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--navy)}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--muted)}
.footer span{color:var(--emerald);font-weight:600}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-logo">⏸</div>
    <div><h1>HALT <span>TRACKER</span></h1><p>Live Trading Halts • Impact Trading Academy</p></div>
  </div>
  <a href="https://trading-training-portal.vercel.app/" class="btn-outline">← Back to Academy</a>
</div>
<div id="app"></div>
<div class="footer">Powered by <span>Mission Metrics</span> • Halt data sourced from NASDAQ & NYSE</div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const HALT_CODES = {
  'LUDP': { name: 'Limit Up-Limit Down Pause', desc: 'Price moved too fast — automatic circuit breaker triggered', severity: 'high' },
  'LULD': { name: 'Limit Up-Limit Down', desc: 'Price band violation — trading paused', severity: 'high' },
  'T1':  { name: 'News Pending', desc: 'Company has pending material news — watch for catalyst', severity: 'medium' },
  'T2':  { name: 'News Released', desc: 'Material news just dropped — expect high volatility on resume', severity: 'high' },
  'T5':  { name: 'Single Stock Trading Pause (10%)', desc: 'Stock moved 10%+ in 5 minutes — massive volatility', severity: 'high' },
  'T6':  { name: 'Extraordinary Market Activity', desc: 'Unusual volume or price action triggered halt', severity: 'medium' },
  'T8':  { name: 'ETF Halt', desc: 'ETF trading paused', severity: 'low' },
  'T12': { name: 'Additional Info Requested', desc: 'Exchange requested more info from company', severity: 'low' },
  'H4':  { name: 'Non-Compliance', desc: 'Company not meeting listing requirements', severity: 'low' },
  'H9':  { name: 'Not Current', desc: 'Company filings are not current', severity: 'low' },
  'H10': { name: 'SEC Trading Suspension', desc: 'SEC suspended trading — avoid this stock', severity: 'high' },
  'H11': { name: 'Regulatory Concern', desc: 'Regulatory issues — exercise extreme caution', severity: 'medium' },
  'M':   { name: 'Volatility Trading Pause', desc: 'Market-wide circuit breaker', severity: 'high' },
  'M1':  { name: 'MWCB Level 1', desc: 'Market dropped 7% — 15 min pause', severity: 'high' },
  'M2':  { name: 'MWCB Level 2', desc: 'Market dropped 13% — 15 min pause', severity: 'high' },
  'M3':  { name: 'MWCB Level 3', desc: 'Market dropped 20% — market closed for day', severity: 'high' },
};

// Simulated halt data (in production, this would poll a real endpoint)
// We'll build the /api/halts endpoint next to serve real NASDAQ data
function generateSimulatedHalts() {
  const now = new Date();
  const symbols = ['GME','AMC','TSLA','NVDA','AAPL','RIVN','SOFI','PLTR','MULN','BBBY','DWAC','PHUN','RDBX','NKLA'];
  const codes = ['LUDP','T1','T2','T5','T6','LULD'];
  const statuses = ['HALTED','HALTED','HALTED','RESUMED','HALTED','RESUMED','HALTED','PENDING'];
  const halts = [];

  const count = 3 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const sym = symbols[Math.floor(Math.random() * symbols.length)];
    const code = codes[Math.floor(Math.random() * codes.length)];
    const status = statuses[Math.floor(Math.random() * statuses.length)];
    const minsAgo = Math.floor(Math.random() * 120);
    const haltTime = new Date(now.getTime() - minsAgo * 60000);

    halts.push({
      symbol: sym,
      haltCode: code,
      status,
      haltTime: haltTime.toISOString(),
      resumeTime: status === 'RESUMED' ? new Date(haltTime.getTime() + (5 + Math.floor(Math.random() * 25)) * 60000).toISOString() : null,
      exchange: Math.random() > 0.5 ? 'NASDAQ' : 'NYSE',
      priceAtHalt: (10 + Math.random() * 200).toFixed(2)
    });
  }
  return halts.sort((a, b) => new Date(b.haltTime) - new Date(a.haltTime));
}

function timeAgo(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 60000;
  if (diff < 1) return 'Just now';
  if (diff < 60) return `${Math.floor(diff)}m ago`;
  return `${Math.floor(diff / 60)}h ${Math.floor(diff % 60)}m ago`;
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit' });
}

function App() {
  const [halts, setHalts] = useState([]);
  const [loading, setLoading] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);
  const [autoRefresh, setAutoRefresh] = useState(true);
  const intervalRef = useRef(null);

  const refresh = async () => {
    setLoading(true);
    // Try the real API first, fall back to simulated
    try {
      const r = await fetch('/api/halts');
      if (r.ok) {
        const data = await r.json();
        if (data.halts && data.halts.length > 0) {
          setHalts(data.halts);
          setLastUpdate(new Date());
          setLoading(false);
          return;
        }
      }
    } catch (e) {}
    // Fallback: simulated data for demo
    setHalts(generateSimulatedHalts());
    setLastUpdate(new Date());
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  useEffect(() => {
    if (autoRefresh) {
      intervalRef.current = setInterval(refresh, 30000); // 30 sec
      return () => clearInterval(intervalRef.current);
    } else {
      clearInterval(intervalRef.current);
    }
  }, [autoRefresh]);

  const activeHalts = halts.filter(h => h.status === 'HALTED');
  const pendingHalts = halts.filter(h => h.status === 'PENDING');
  const resumedHalts = halts.filter(h => h.status === 'RESUMED');

  return (
    <div className="content">
      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'12px'}}>
          <h2><span className="dot" /> Trading Halts</h2>
          <span className="live-badge"><span className="blink" /> LIVE</span>
          <button className="refresh-btn" onClick={refresh} disabled={loading}>{loading ? 'Refreshing...' : '↻ Refresh Now'}</button>
        </div>
        <div style={{display:'flex',gap:'8px',alignItems:'center',fontSize:'12px',color:'var(--muted)'}}>
          {lastUpdate && <span>Last updated: {formatTime(lastUpdate.toISOString())}</span>}
          <label style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'6px',cursor:'pointer'}}>
            <input type="checkbox" checked={autoRefresh} onChange={e => setAutoRefresh(e.target.checked)} style={{accentColor:'var(--emerald)'}} />
            Auto-refresh (30s)
          </label>
        </div>

        <div className="stats-row">
          <div className="stat"><div className="lbl">Active Halts</div><div className="val" style={{color:'#DC2626'}}>{activeHalts.length}</div></div>
          <div className="stat"><div className="lbl">Pending</div><div className="val" style={{color:'#D97706'}}>{pendingHalts.length}</div></div>
          <div className="stat"><div className="lbl">Resumed</div><div className="val" style={{color:'#059669'}}>{resumedHalts.length}</div></div>
          <div className="stat"><div className="lbl">Total Today</div><div className="val">{halts.length}</div></div>
        </div>
      </div>

      {activeHalts.length > 0 && (
        <div className="card" style={{borderColor:'#FECACA'}}>
          <h2 style={{color:'#DC2626'}}>🔴 Currently Halted ({activeHalts.length})</h2>
          <p style={{fontSize:'12px',color:'var(--muted)',marginBottom:'12px'}}>These stocks are currently halted. Watch for resume — massive volatility expected.</p>
          <div className="halt-list">
            {activeHalts.map((h, i) => {
              const info = HALT_CODES[h.haltCode] || { name: h.haltCode, desc: 'Unknown halt reason', severity: 'low' };
              return (
                <div key={i} className="halt-item" onClick={() => window.open(`/tradingview-charts.html?symbol=${h.symbol}`, '_blank')}>
                  <div className="halt-sym">{h.symbol}</div>
                  <div className="halt-reason">
                    <div className="reason">{info.name}</div>
                    <div className="detail">{info.desc} • {h.exchange} • ${h.priceAtHalt}</div>
                  </div>
                  <span className="status-badge status-halted">HALTED</span>
                  <div className="halt-time">
                    <div className="time">{formatTime(h.haltTime)}</div>
                    <div className="ago">{timeAgo(h.haltTime)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {resumedHalts.length > 0 && (
        <div className="card">
          <h2 style={{color:'#059669'}}>🟢 Recently Resumed ({resumedHalts.length})</h2>
          <div className="halt-list">
            {resumedHalts.map((h, i) => {
              const info = HALT_CODES[h.haltCode] || { name: h.haltCode, desc: 'Unknown', severity: 'low' };
              return (
                <div key={i} className="halt-item" onClick={() => window.open(`/tradingview-charts.html?symbol=${h.symbol}`, '_blank')}>
                  <div className="halt-sym">{h.symbol}</div>
                  <div className="halt-reason">
                    <div className="reason">{info.name}</div>
                    <div className="detail">{h.exchange} • Halted at ${h.priceAtHalt}</div>
                  </div>
                  <span className="status-badge status-resumed">RESUMED</span>
                  <div className="halt-time">
                    <div className="time">{h.resumeTime ? formatTime(h.resumeTime) : '—'}</div>
                    <div className="ago">{h.resumeTime ? timeAgo(h.resumeTime) : ''}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {halts.length === 0 && !loading && (
        <div className="card"><div className="empty">No trading halts detected right now. Markets may be closed or all halts have resumed.</div></div>
      )}

      <div className="explanation">
        <h3>📘 How to Use This for Trading</h3>
        When a stock gets halted for volatility (LULD/T5) or news (T1/T2), it often resumes with massive candle spikes — sometimes 10%+ in seconds. Day traders watch halt lists to catch these explosive moves. When a stock resumes from a halt: (1) Watch the first 30 seconds for direction, (2) Apply your S.E.T. rule before entering, (3) Never risk more than 1%, (4) Volume on resume confirms institutional conviction.
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('app'));
</script>

      <div style="display:flex;align-items:center;gap:10px;">

</div>

</body>
</html>
